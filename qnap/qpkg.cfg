# TuneThatHue - QNAP package config (QDK).
QPKG_NAME="TuneThatHue"
QPKG_DISPLAY_NAME="TuneThatHue"
QPKG_VER="0.1.0"
QPKG_AUTHOR="Silas Mariusz Grzybacz"
QPKG_LICENSE="Apache-2.0"
QPKG_SUMMARY="Sync Philips Hue lights to any audio - standalone, no Home Assistant."

# Start/stop ordering + the service script.
QPKG_RC_NUM="101"
QPKG_SERVICE_PROGRAM="tunethathue.sh"

# The daemon serves its browser panel on this loopback port; QNAP proxies to it.
QPKG_SERVICE_PORT="58091"
QPKG_WEBUI="/"
QPKG_WEB_PORT="58091"
QPKG_USE_PROXY="1"
QPKG_PROXY_PATH="/TuneThatHue"

QTS_MINI_VERSION="5.0.0"
QPKG_TIMEOUT="30,30"

# Visible to all NAS users on the Main menu.
QPKG_VISIBLE="2"
QPKG_FORCE_VISIBLE="3"

QDK_DATA_DIR_ICONS="icons"
QDK_DATA_DIR_SHARED="shared"
